version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    # Suppress automatic major bumps — they need code-level migration.
    # Security updates still come through (automated-security-fixes is enabled at the repo level).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "tsup"
          - "tsx"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "msw"
      lint:
        patterns:
          - "@biomejs/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
